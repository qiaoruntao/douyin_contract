syntax = "proto3";

package douyin;

// wss envelope types -- NOT part of the generated Webcast.Im.* schema below
// (live-schema-im.js only covers Message.payload contents, not the outer
// wss frame), ported from douyin_live_fetcher's prior copy and kept here by
// hand. Everything else in this file is generated -- see README.md.
message PushFrame {
  uint64 seqId = 1;
  uint64 logId = 2;
  uint64 service = 3;
  uint64 method = 4;
  repeated HeadersList headersList = 5;
  string payloadEncoding = 6;
  string payloadType = 7;
  bytes payload = 8;
}

message HeadersList {
  string key = 1;
  string value = 2;
}

message Response {
  repeated Message messagesList = 1;
  string cursor = 2;
  uint64 fetchInterval = 3;
  uint64 now = 4;
  string internalExt = 5;
  uint32 fetchType = 6;
  map<string, string> routeParams = 7;
  uint64 heartbeatDuration = 8;
  bool needAck = 9;
  string pushServer = 10;
  string liveCursor = 11;
  bool historyNoMore = 12;
}

message Message {
  string method = 1;
  bytes payload = 2;
  int64 msgId = 3;
  int32 msgType = 4;
  int64 offset = 5;
  bool needWrdsStore = 6;
  int64 wrdsVersion = 7;
  string wrdsSubKey = 8;
}

message Webcast {

  message Im {

    message RoomBorderMessage {
      Webcast.Im.Common common = 1;
      Webcast.Data.BorderInfo border_info = 2;
    }

    message Common {
      string method = 1;
